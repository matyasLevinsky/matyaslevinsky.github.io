<script>
document.addEventListener("DOMContentLoaded", function () {
  // Listing card and article header tags — text content becomes data-value
  document.querySelectorAll(".listing-category, .quarto-category").forEach(function (el) {
    if (!el.getAttribute("data-value")) {
      el.setAttribute("data-value", el.textContent.trim());
    }
  });

  // Align category sidebar top to the listing section, so it doesn't float above the bio
  function alignSidebarToListing() {
    var sidebar = document.getElementById("quarto-margin-sidebar");
    var listing = document.querySelector(".quarto-listing");
    if (!sidebar || !listing) return;
    sidebar.style.marginTop = "";
    var offset = listing.getBoundingClientRect().top - sidebar.getBoundingClientRect().top;
    if (offset > 0) sidebar.style.marginTop = offset + "px";
  }
  alignSidebarToListing();
  window.addEventListener("resize", alignSidebarToListing);

  // Filter sidebar buttons — data-category is base64(encodeURIComponent(name))
  document.querySelectorAll(".quarto-listing-category .category").forEach(function (el) {
    var encoded = el.getAttribute("data-category");
    var decoded;
    if (!encoded) {
      decoded = "all";
    } else {
      try {
        decoded = decodeURIComponent(atob(encoded));
      } catch (e) {
        decoded = encoded;
      }
    }
    el.setAttribute("data-value", decoded);
  });
});
</script>
